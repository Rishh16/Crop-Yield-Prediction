<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Agri IoT — Crop yield{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>{% block heading %}Smart agriculture dashboard{% endblock %}</h1>
      </div>
      <div class="topbar-actions">
        <nav class="nav" aria-label="Main">
          <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' else '' }}">Home</a>
          <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' else '' }}">Dashboard</a>
          <a href="{{ url_for('history') }}" class="{{ 'active' if request.endpoint == 'history' else '' }}">History</a>
          <a href="{{ url_for('about') }}" class="{{ 'active' if request.endpoint == 'about' else '' }}">About</a>
        </nav>
        {% block live_pill %}
        <div class="live-pill" id="livePill">
          <span class="dot"></span>
          <span id="livePillText">Sensors: waiting for data</span>
        </div>
        {% endblock %}
      </div>
    </header>

    {% block content %}{% endblock %}

  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
